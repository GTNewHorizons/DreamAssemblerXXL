name: Daily modpack build

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *' # 3:20am UTC every day

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      today: ${{ steps.date.outputs.today }}
      daily_non_daily_changelog_file: ${{ steps.release-info.outputs.daily_non_daily_changelog_file }}
      changelog_name: ${{ steps.changelog-name.outputs.changelog_name }}
    steps:
      #  check-out repo and set-up python
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master
          persist-credentials: false

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: 3.10.5

      # install & configure poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      # load cached venv if cache exists
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', '*/poetry.lock') }}

      # install dependencies if cache does not exist
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      # install your root project, if required
      - name: Install library
        run: poetry install --no-interaction

      - name: Get current date
        id: date
        shell: bash
        run: |
          echo "today=$(date --iso-8601)+${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "cachedate=$(date '+%G-w%V')" >> "$GITHUB_OUTPUT"

      - name: Load cached mod zips
        id: load_mod_cache
        uses: actions/cache/restore@v5
        with:
          path: cache
          key: daxxl-daily-${{ runner.os }}-${{ steps.date.outputs.cachedate }}
          restore-keys: |
            daxxl-daily-${{ runner.os }}-

      - name: Build modpack archives
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.NIGHTLY_GITHUB_TOKEN }}
        run: |
          poetry run python -m gtnh.cli.generate_daily --id "${{ github.run_number }}" --update-available
          poetry run python -m gtnh.cli.assemble_daily

      - name: Save cached mod zips
        uses: actions/cache/save@v5
        if: steps.load_mod_cache.outputs.cache-hit != 'true'
        with:
          path: cache
          key: daxxl-daily-${{ runner.os }}-${{ steps.date.outputs.cachedate }}

      - name: Retrieve last non-daily release name
        id: release-info
        shell: bash
        run: |
          last_non_daily_release_name=$(jq -r '
          .releases
          | map(select(contains("experimental") | not))
          | map(select(contains("daily") | not))
          | sort_by(
              [
                (split("-")[0] | split(".") | map(tonumber)),   # major.minor.patch as numbers
                (if test("-rc|RC|beta|Beta|BETA") then 0 else 1 end), # pre-releases first
                .                                                # tie-breaker: lexical order
              ]
          ) | last
          ' ./gtnh-modpack.json)
          changelog_file="./releases/changelogs/changelog from ${last_non_daily_release_name} to daily.md"
          echo "daily_non_daily_changelog_file=${changelog_file}" >> "$GITHUB_ENV"
          echo "last_non_daily_release_name=${last_non_daily_release_name}" >> "$GITHUB_ENV"
          echo "daily_non_daily_changelog_file=${changelog_file}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog between daily and last non-daily release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.NIGHTLY_GITHUB_TOKEN }}
        run: |
          poetry run python -m gtnh.cli.generate_changelog --previous-release-name "$last_non_daily_release_name" daily > "$daily_non_daily_changelog_file"

      - name: Upload manifest job summary
        shell: bash
        if: success() || failure()
        continue-on-error: true
        run: |
          echo "## GTNH Daily build ${{ steps.date.outputs.today }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "<details><summary><b>Github mods</b></summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mod | Version | Side |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ------- | ---- |" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.github_mods | keys[] as $k | ["", $k, .[$k].version, .[$k].side, ""] | join(" | ") | ltrimstr(" ")' releases/manifests/daily.json | sort >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "<details><summary><b>External mods</b></summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mod | Version | Side |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ------- | ---- |" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.external_mods | keys[] as $k | ["", $k, .[$k].version, .[$k].side, ""] | join(" | ") | ltrimstr(" ")' releases/manifests/daily.json | sort >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Relocate built zips
        shell: bash
        run: |
          mv releases/zip/GT_New_Horizons_daily_Server_Java_8.zip "GTNH-daily-${{ steps.date.outputs.today }}-server-java8.zip"
          mv releases/zip/GT_New_Horizons_daily_Server_Java_17-25.zip "GTNH-daily-${{ steps.date.outputs.today }}-server-java17-25.zip"
          mv releases/multi_poly/GT_New_Horizons_daily_Java_8.zip "GTNH-daily-${{ steps.date.outputs.today }}-mmcprism-java8.zip"
          mv releases/multi_poly/GT_New_Horizons_daily_Java_17-25.zip "GTNH-daily-${{ steps.date.outputs.today }}-mmcprism-java17-25.zip"

      # Pulls the newest changelog filename and stores it in an env variable
      # so we can use it in the commit
      - name: Retrieve Changelog Name
        id: changelog-name
        shell: bash
        run: |
          changelog_name=$(./scripts/newest_changelog.sh './releases/changelogs/daily builds')
          echo "changelog_name=${changelog_name}" >> "$GITHUB_OUTPUT"

      # Bundle everything the test/upload jobs need into a single internal artifact
      - name: Upload build bundle for downstream jobs
        uses: actions/upload-artifact@v7
        with:
          name: daily-build-bundle
          path: |
            GTNH-daily-${{ steps.date.outputs.today }}-server-java8.zip
            GTNH-daily-${{ steps.date.outputs.today }}-server-java17-25.zip
            GTNH-daily-${{ steps.date.outputs.today }}-mmcprism-java8.zip
            GTNH-daily-${{ steps.date.outputs.today }}-mmcprism-java17-25.zip
            releases/manifests/daily.json
            releases/changelogs/
            gtnh-assets.json
          if-no-files-found: error
          retention-days: 1


  test:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write # publish release
    strategy:
      fail-fast: false
      matrix:
        include:
          - java-version: 25
            server-zip-variant: server-java17-25
            client-zip-variant: mmcprism-java17-25
            server-java-args: "-Xms1G -Xmx2G -Dfml.readTimeout=5 @java9args.txt -jar lwjgl3ify-forgePatches.jar nogui"
            server-startup-timeout: 120
            server-settle-time: 60
            client-max-memory: 3400m

          - java-version: 8
            server-zip-variant: server-java8
            client-zip-variant: mmcprism-java17-25
            server-java-args: "-Xms1G -Xmx2500m -XX:+UseStringDeduplication -XX:+UseCompressedOops -XX:+UseCodeCacheFlushing -Dfml.readTimeout=5 -jar forge-1.7.10-10.13.4.1614-1.7.10-universal.jar nogui"
            server-startup-timeout: 240
            server-settle-time: 120
            client-max-memory: 4400m

    env:
      WORK_DIR: /tmp/daily-test
      SERVER_JAVA_ARGS: ${{ matrix.server-java-args }}
      SERVER_START_TIMEOUT: ${{ matrix.server-startup-timeout }}
      SERVER_SETTLE_DURATION: ${{ matrix.server-settle-time }}
      RCON_PASSWORD: whoahaplaintextpassword
      CLIENT_WINDOW_NAME: "GT New Horizons"
      CLIENT_FOCUS_TIMEOUT: 180

    steps:
      - name: Check out repository for scripts
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master
          persist-credentials: false
          sparse-checkout: 
            scripts/

      - name: Install dependencies (for clientside)
        run: |
          sudo apt update
          sudo apt install -y xvfb libgl1-mesa-dri xauth libegl1 libegl-mesa0 ffmpeg fonts-dejavu-core python3-xlib xdotool x11-xserver-utils scrot

      - name: Download build bundle
        uses: actions/download-artifact@v8
        with:
          name: daily-build-bundle

      - name: Unpack build artifacts
        run: |
          set -euo pipefail
          mkdir -p ${{ env.WORK_DIR }}/server
          unzip -q -o "GTNH-daily-${{ needs.build.outputs.today }}-${{ matrix.server-zip-variant }}.zip" -d ${{ env.WORK_DIR }}/server
          chmod -R u+rX ${{ env.WORK_DIR }}/server
          mkdir -p ${{ env.WORK_DIR }}/client
          unzip -q -o "GTNH-daily-${{ needs.build.outputs.today }}-${{ matrix.client-zip-variant }}.zip" -d /tmp/client-unpacked
          inner_dir=$(find /tmp/client-unpacked -mindepth 1 -maxdepth 1 -type d | head -n1)
          chmod -R u+rX "$inner_dir"
          cp -r "$inner_dir/." ${{ env.WORK_DIR }}/client

      - name: Install Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Install RCON
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o rcon-cli.tar.gz https://github.com/itzg/rcon-cli/releases/download/1.7.5/rcon-cli_1.7.5_linux_amd64.tar.gz
          echo "587f771ae5d4424eb6c15cdf76634049cb29c3ff2b2020500fe26c64c66aab62  rcon-cli.tar.gz" | sha256sum -c -
          tar -xz -C /usr/local/bin -f rcon-cli.tar.gz rcon-cli
          rm rcon-cli.tar.gz

      - name: Install prism-bootstrap
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o prism-bootstrap https://github.com/MalTeeez/prism-bootstrap/releases/download/1.0.2/prism-bootstrap-1.0.2-x86_64-unknown-linux-gnu
          echo "c9701ac81478b808a9bd13a2290e12398cc139a0a40468081e8c4b00aabdc893  prism-bootstrap" | sha256sum -c -
          chmod +x prism-bootstrap && mv prism-bootstrap /usr/local/bin/

      - name: Install client
        shell: bash
        working-directory: ${{ env.WORK_DIR }}/client
        run: >-
          prism-bootstrap .
          --platform linux
          --headless
          --xmx ${{ matrix.client-max-memory }}
          --jvm-arg "-Dheadlessnh.active=true"
          --jvm-arg "-Dheadlessnh.combined=true"
          --jvm-arg "-Dheadlessnh.markerdir=${{ env.WORK_DIR }}/run"
          --jvm-arg "-Dheadlessnh.delay.cooldown=2500"
          --jvm-arg "-Dheadlessnh.delay.mainmenu=7500"
          --jvm-arg "-Dheadlessnh.delay.serverjoin=10000"
          --jvm-arg "-Dheadlessnh.delay.singleplayer=10000"
          --game-dir ${{ env.WORK_DIR }}/client/.minecraft

      - name: Add HeadlessNH to client mods
        shell: bash
        working-directory: ${{ env.WORK_DIR }}/client/.minecraft/mods
        run: |
          set -euo pipefail
          curl -sSL -o headlessnh-1.0.8.jar https://github.com/MalTeeez/HeadlessNH/releases/download/1.0.8/headlessnh-1.0.8.jar
          echo "a6ca650bdf6fd308432a9e6b6414e018b34ad603ab6665a851a339a6f60873cc  headlessnh-1.0.8.jar" | sha256sum -c -

      - name: Start server
        timeout-minutes: 10
        run: bash scripts/tests/orchestrator.sh start-server

      - name: Run client
        timeout-minutes: 10
        env: 
          XDG_DATA_HOME: ${{ env.WORK_DIR }}/run
        run: bash scripts/tests/orchestrator.sh run-client

      - name: Stop server
        run: bash scripts/tests/orchestrator.sh stop-server

      - name: Verify server
        if: always()
        run: bash scripts/tests/orchestrator.sh verify-server

      - name: Verify client
        if: always()
        run: bash scripts/tests/orchestrator.sh verify-client

      # GH markdown seems to only embed media from CSP-allowlisted domains, which does not include artifacts.
      # Release asset URLs redirect to release-assets.githubusercontent.com (which is allowed), 
      # so we use a rolling prerelease as the media host for the summary embeds.
      - name: Publish screenshots to rolling release
        id: publish-media
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: daily-screenshots
        run: |
          set -uo pipefail
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" --prerelease \
              --title "Daily test screenshots" \
              --notes "Storage for the screenshots embedded in daily test run summaries. Not an actual release." || true

          for marker in mainmenu serverloaded worldloaded; do
            src="$WORK_DIR/run/screenshot.$marker.png"
            [ -f "$src" ] || continue
            asset="java${{ matrix.java-version }}-$marker.png"
            cp "$src" "/tmp/$asset"
            if gh release upload "$TAG" "/tmp/$asset" -R "$GITHUB_REPOSITORY" --clobber; then
              echo "url_$marker=https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$asset" >> "$GITHUB_OUTPUT"
            fi
          done

          video="$WORK_DIR/run/client.mp4"
          if [ -f "$video" ]; then
            asset="java${{ matrix.java-version }}-client.mp4"
            cp "$video" "/tmp/$asset"
            if gh release upload "$TAG" "/tmp/$asset" -R "$GITHUB_REPOSITORY" --clobber; then
              echo "url_video=https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$asset" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload test job summary
        shell: bash
        if: success() || failure()
        continue-on-error: true
        env:
          URL_mainmenu: ${{ steps.publish-media.outputs.url_mainmenu }}
          URL_serverloaded: ${{ steps.publish-media.outputs.url_serverloaded }}
          URL_worldloaded: ${{ steps.publish-media.outputs.url_worldloaded }}
          VIDEO_RELEASE_URL: ${{ steps.publish-media.outputs.url_video }}
        run: |
          echo "<details open><summary><b>Client test results (Java ${{ matrix.java-version }})</b></summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Java ${{ matrix.java-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ------ |" >> "$GITHUB_STEP_SUMMARY"

          while IFS=: read -r marker label; do
            url_var="URL_$marker"
            url="${!url_var}"
            if [ -n "$url" ]; then
              echo "| $label | ![screenshot]($url) |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $label | :x: |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done <<'EOF'
          mainmenu:Main menu
          serverloaded:Joined server
          worldloaded:Joined singleplayer
          EOF

          if [ -n "$VIDEO_RELEASE_URL" ]; then
            echo "| Recording | [:white_check_mark: recording]($VIDEO_RELEASE_URL) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Recording | :x: |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Final important summary append
        shell: bash
        if: success()
        run: |
          echo "# :shipit:" >> "$GITHUB_STEP_SUMMARY"


  upload:
    needs: [build, test]
    runs-on: ubuntu-24.04
    env:
      daily_non_daily_changelog_file: ${{ needs.build.outputs.daily_non_daily_changelog_file }}
      changelog_name: ${{ needs.build.outputs.changelog_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.NIGHTLY_GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
          ref: master

      - name: Download build bundle
        uses: actions/download-artifact@v7
        with:
          name: daily-build-bundle

      # Upload the actual variants of the modpack now that we've tested them
      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: gtnh-daily-${{ needs.build.outputs.today }}-manifest.json
          path: releases/manifests/daily.json

      - name: Upload server zip
        uses: actions/upload-artifact@v7
        with:
          path: GTNH-daily-${{ needs.build.outputs.today }}-server-java8.zip
          archive: false

      - name: Upload modern java server zip
        uses: actions/upload-artifact@v7
        with:
          path: GTNH-daily-${{ needs.build.outputs.today }}-server-java17-25.zip
          archive: false

      - name: Upload MMC zip
        uses: actions/upload-artifact@v7
        with:
          path: GTNH-daily-${{ needs.build.outputs.today }}-mmcprism-java8.zip
          archive: false

      - name: Upload modern java Prism zip
        uses: actions/upload-artifact@v7
        with:
          path: GTNH-daily-${{ needs.build.outputs.today }}-mmcprism-java17-25.zip
          archive: false

      - name: Push daily changelog in commit to master
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git add "$daily_non_daily_changelog_file"
          git add "./releases/changelogs/daily builds"
          git add ./releases/manifests/daily.json
          git add ./gtnh-assets.json
          git commit -m "Upload daily $changelog_name"
          git push origin master
