name: lint-and-test

on: pull_request

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: 3.11
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      #----------------------------------------------
      #              lint & type-check
      #----------------------------------------------
      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check

      - name: Run tests
        run: uv run pytest -q