name: Modpack test

# Reusable workflow that runs the dual server/client smoke test against a set of
# already-built modpack zips and publishes the resulting media (screenshots,
# recording, flamegraph) to a rolling prerelease asset store (and uses them in the job summary). 

on:
  workflow_call:
    inputs:
      bundle-name:
        description: Name of the build-bundle artifact to download
        type: string
        required: true
      zip-prefix:
        description: >-
          Basename prefix of the built zips, such that the four variants are
          "<zip-prefix>-server-java8.zip", "<zip-prefix>-server-java17-26.zip",
          "<zip-prefix>-mmcprism-java8.zip" and "<zip-prefix>-mmcprism-java17-26.zip".
        type: string
        required: true
      today:
        description: Build id (e.g. "2026-06-26+123"); used to derive media filenames.
        type: string
        required: true
      media-label:
        description: >-
          Label woven into media asset filenames (e.g. "daily", "experimental",
          "custom-<tag>"). Replaces the "+" in <today> so names stay date-prefixed.
        type: string
        required: true
      media-tag:
        description: Release tag of the rolling media asset store.
        type: string
        required: true
      media-title:
        description: Title used when first creating the rolling media asset store release.
        type: string
        required: true
      retention-days:
        description: How many days assets should be kept in the rolling asset store.
        type: number
        default: 90
      max-assets:
        description: Hard cap on the number of dated assets kept in the rolling asset store.
        type: number
        default: 900

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # publish release
    strategy:
      fail-fast: false
      matrix:
        include:
          - java-version: 25
            server-zip-variant: server-java17-26
            client-zip-variant: mmcprism-java17-26
            server-java-args: |
              -Xms1G -Xmx2G
              -Dfml.readTimeout=45
              -Dhorizonqa.mode=ci -Dhorizonqa.autoRun=false -Dhorizonqa.world=normal -Dhorizonqa.gridOrigin=0,128,0
              -Dhorizonqa.reportDir=/tmp/daily-test/run
              @java9args.txt
              -jar lwjgl3ify-forgePatches.jar
              nogui
            server-startup-timeout: 140
            server-settle-time: 45
            client-join-settle-time: 5000
            client-max-memory: 3400m

          - java-version: 8
            server-zip-variant: server-java8
            client-zip-variant: mmcprism-java8
            server-java-args: |
              -Xms1G -Xmx2500m
              -XX:+UseStringDeduplication -XX:+UseCompressedOops -XX:+UseCodeCacheFlushing
              -Dfml.readTimeout=45
              -Dhorizonqa.mode=ci -Dhorizonqa.autoRun=false -Dhorizonqa.world=normal -Dhorizonqa.gridOrigin=0,128,0
              -Dhorizonqa.reportDir=/tmp/daily-test/run
              -jar forge-1.7.10-10.13.4.1614-1.7.10-universal.jar
              nogui
            server-startup-timeout: 240
            server-settle-time: 85
            client-join-settle-time: 10000
            client-max-memory: 4400m

    env:
      WORK_DIR: /tmp/daily-test
      SERVER_JAVA_ARGS: ${{ matrix.server-java-args }}
      SERVER_START_TIMEOUT: ${{ matrix.server-startup-timeout }}
      SERVER_SETTLE_DURATION: ${{ matrix.server-settle-time }}
      RCON_PASSWORD: whoahaplaintextpassword
      CLIENT_WINDOW_NAME: "GT: New Horizons"
      CLIENT_FOCUS_TIMEOUT: 120

    steps:
      - name: Check out repository for scripts
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master
          persist-credentials: false
          sparse-checkout:
            scripts/

      - name: Install dependencies (for clientside)
        run: |
          sudo apt update
          sudo apt install -y xvfb libgl1-mesa-dri xauth libegl1 libegl-mesa0 ffmpeg fonts-dejavu-core python3-xlib xdotool x11-xserver-utils scrot x11-utils

      - name: Download build bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.bundle-name }}

      - name: Unpack build artifacts
        run: |
          set -euo pipefail
          mkdir -p ${{ env.WORK_DIR }}/run ${{ env.WORK_DIR }}/server ${{ env.WORK_DIR }}/client
          unzip -q -o "${{ inputs.zip-prefix }}-${{ matrix.server-zip-variant }}.zip" -d ${{ env.WORK_DIR }}/server
          chmod -R u+rX ${{ env.WORK_DIR }}/server
          unzip -q -o "${{ inputs.zip-prefix }}-${{ matrix.client-zip-variant }}.zip" -d /tmp/client-unpacked
          inner_dir=$(find /tmp/client-unpacked -mindepth 1 -maxdepth 1 -type d | head -n1)
          chmod -R u+rX "$inner_dir"
          cp -r "$inner_dir/." ${{ env.WORK_DIR }}/client

      - name: Install Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Install RCON
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o rcon-cli.tar.gz https://github.com/itzg/rcon-cli/releases/download/1.7.5/rcon-cli_1.7.5_linux_amd64.tar.gz
          echo "587f771ae5d4424eb6c15cdf76634049cb29c3ff2b2020500fe26c64c66aab62  rcon-cli.tar.gz" | sha256sum -c -
          tar -xz -C /usr/local/bin -f rcon-cli.tar.gz rcon-cli
          rm rcon-cli.tar.gz

      - name: Install async-profiler & flamegraph
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o async-profiler.tar.gz https://github.com/async-profiler/async-profiler/releases/download/v4.4/async-profiler-4.4-linux-x64.tar.gz
          echo "1233f26fc95753e75ce32733bbcaf8f0bedc2c098b0e798af87935b08a63b24e  async-profiler.tar.gz" | sha256sum -c -
          mkdir -p /tmp/async-profiler
          tar -xz --strip-components=1 -C /tmp/async-profiler -f async-profiler.tar.gz
          ln -s /tmp/async-profiler/bin/asprof /usr/local/bin/asprof
          curl -sSL -o flamegraph.pl https://raw.githubusercontent.com/brendangregg/FlameGraph/41fee1f99f9276008b7cd112fca19dc3ea84ac32/flamegraph.pl
          chmod +x flamegraph.pl
          mv flamegraph.pl ${{ env.WORK_DIR }}/run/

      - name: Install prism-bootstrap
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o prism-bootstrap https://github.com/MalTeeez/prism-bootstrap/releases/download/1.0.3/prism-bootstrap-1.0.3-x86_64-unknown-linux-gnu
          echo "0240c93ec6e7b666b39bdf61032fa795223cdbe5b3c4349cd1fa76ca6346d144  prism-bootstrap" | sha256sum -c -
          chmod +x prism-bootstrap && mv prism-bootstrap /usr/local/bin/

      - name: Install client
        shell: bash
        working-directory: ${{ env.WORK_DIR }}/client
        run: >-
          prism-bootstrap .
          --platform linux
          --headless
          --meta-url https://meta.prismlauncher.org/v1/
          --xmx ${{ matrix.client-max-memory }}
          --jvm-arg "-agentpath:/tmp/async-profiler/lib/libasyncProfiler.so=start,event=ctimer,collapsed,file=${{ env.WORK_DIR }}/run/client_profile.collapsed"
          --jvm-arg "-Dheadlessnh.active=true"
          --jvm-arg "-Dheadlessnh.combined=true"
          --jvm-arg "-Dheadlessnh.markerdir=${{ env.WORK_DIR }}/run"
          --jvm-arg "-Dheadlessnh.delay.cooldown=2500"
          --jvm-arg "-Dheadlessnh.delay.mainmenu=7500"
          --jvm-arg "-Dheadlessnh.delay.serverjoin=${{ matrix.client-join-settle-time }}"
          --jvm-arg "-Dheadlessnh.delay.singleplayer=${{ matrix.client-join-settle-time }}"
          --jvm-arg "-Dheadlessnh.gate.mainmenu=server.ready"
          --jvm-arg "-Dheadlessnh.gate.serverloaded=serverloaded.gate"
          --jvm-arg "-Dheadlessnh.gate.timeout=60000"
          --jvm-arg "-Dheadlessnh.forcefocus=true"
          --game-dir ${{ env.WORK_DIR }}/client/.minecraft

      - name: Add HeadlessNH to client mods
        shell: bash
        working-directory: ${{ env.WORK_DIR }}/client/.minecraft/mods
        run: |
          set -euo pipefail
          curl -sSL -o headlessnh-1.1.1.jar https://github.com/GTNewHorizons/HeadlessNH/releases/download/1.1.1/headlessnh-1.1.1.jar
          echo "f1da0976f3b3af1258de803c62534464dc45167aa4b07ae43e27ad1cc72f6e1b  headlessnh-1.1.1.jar" | sha256sum -c -

      - name: Add HorizonQA to both client & server mods
        shell: bash
        working-directory: ${{ env.WORK_DIR }}
        run: |
          set -euo pipefail
          curl -sSL -o horizonqa-0.10.0.jar https://github.com/GTNewHorizons/Horizon-QA/releases/download/0.10.0/horizonqa-0.10.0.jar
          echo "1cd28aa91017a8cbfd7649d598e309e77f7f4d2b8235d209f29a8eacf12d301d  horizonqa-0.10.0.jar" | sha256sum -c -
          cp -v horizonqa-0.10.0.jar ${{ env.WORK_DIR }}/client/.minecraft/mods/
          cp -v horizonqa-0.10.0.jar ${{ env.WORK_DIR }}/server/mods/

      - name: Start server
        id: start-server
        timeout-minutes: 10
        run: bash scripts/tests/orchestrator.sh start-server

      - name: Run client
        timeout-minutes: 15
        env:
          XDG_DATA_HOME: ${{ env.WORK_DIR }}/run
        run: bash scripts/tests/orchestrator.sh run-client

      - name: Stop server
        if: always() && steps.start-server.outcome == 'success'
        run: bash scripts/tests/orchestrator.sh stop-server

      - name: Print logs from dual run
        if: success() || failure()
        run: |
         echo "--- Logs from dual test : executor ---"
         cat ${{ env.WORK_DIR }}/run/dual_test_executor.log || true
         echo "--- Logs from dual test : client ---"
         cat ${{ env.WORK_DIR }}/run/dual_test_client.log || true
         echo "--- Logs from dual test : server ---"
         cat ${{ env.WORK_DIR }}/run/dual_test_server.log || true

      - name: Verify server
        if: success() || failure()
        run: bash scripts/tests/orchestrator.sh verify-server

      - name: Verify client
        if: success() || failure()
        run: bash scripts/tests/orchestrator.sh verify-client


      - name: Create flamegraph
        if: success() || failure()
        working-directory: ${{ env.WORK_DIR }}/run
        continue-on-error: true
        run: |
          set -euo pipefail
          # Low-detail preview svg (small file); full detail lives in the linked html.
          ./flamegraph.pl --color=java --width=840 --minwidth=1 client_profile.collapsed > client_profile.svg
          # Scale the summary <img> to fit within 840x480 preserving aspect ratio
          # (GitHub strips css, so we set width/height attributes computed from the svg).
          w=$(sed -nE 's/.*<svg[^>]* width="([0-9.]+)".*/\1/p' client_profile.svg | head -1)
          h=$(sed -nE 's/.*<svg[^>]* height="([0-9.]+)".*/\1/p' client_profile.svg | head -1)
          if [ -n "$w" ] && [ -n "$h" ]; then
            dims=$(awk -v w="$w" -v h="$h" 'BEGIN{s=840/w; if(480/h<s)s=480/h; if(s>1)s=1; printf "%d %d", w*s, h*s}')
            echo "FLAMEGRAPH_W=${dims% *}" >> "$GITHUB_ENV"
            echo "FLAMEGRAPH_H=${dims#* }" >> "$GITHUB_ENV"
          fi
          # Full-detail html with (also has more features, that ARENT laggy)
          /tmp/async-profiler/bin/jfrconv -o html --title "GTNH ${{ inputs.media-label }} startup (Java ${{ matrix.java-version }})" client_profile.collapsed client_profile.html

      # GH markdown seems to only embed media from CSP-allowlisted domains, which does not include artifacts.
      # Release asset URLs redirect to release-assets.githubusercontent.com (which is allowed),
      # so we use a rolling prerelease as the media host for the summary embeds. Assets are keyed by
      # date and run number so every run is preserved; the prune step below rolls assets with a 90-day retention.
      - name: Publish media to rolling asset store
        id: publish-media
        if: success() || failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.media-tag }}
          TITLE: ${{ inputs.media-title }}
          TODAY: ${{ inputs.today }}
          LABEL: ${{ inputs.media-label }}
        run: |
          set -uo pipefail
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" --prerelease \
              --title "$TITLE" \
              --notes "**This is not an actual release.** This is the asset storage for modpack builds." || true

          prefix="${TODAY/+/-${LABEL}-}-java${{ matrix.java-version }}"

          for marker in mainmenu serverloaded dual worldloaded; do
            src="$WORK_DIR/run/screenshot.$marker.png"
            [ -f "$src" ] || continue
            asset="${prefix}-$marker.png"
            cp "$src" "/tmp/$asset"
            if gh release upload "$TAG" "/tmp/$asset" -R "$GITHUB_REPOSITORY" --clobber; then
              echo "url_$marker=https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$asset" >> "$GITHUB_OUTPUT"
            fi
          done

          video="$WORK_DIR/run/client.mp4"
          if [ -f "$video" ]; then
            asset="${prefix}-client.mp4"
            cp "$video" "/tmp/$asset"
            if gh release upload "$TAG" "/tmp/$asset" -R "$GITHUB_REPOSITORY" --clobber; then
              # Use a proxy so we can get the correct content type
              echo "url_video=https://githubproxy.samuelcolvin.workers.dev/$GITHUB_REPOSITORY/releases/download/$TAG/$asset" >> "$GITHUB_OUTPUT"
            fi
          fi

          flamegraph="$WORK_DIR/run/client_profile.svg"
          if [ -f "$flamegraph" ]; then
            asset="${prefix}-flamegraph.svg"
            cp "$flamegraph" "/tmp/$asset"
            if gh release upload "$TAG" "/tmp/$asset" -R "$GITHUB_REPOSITORY" --clobber; then
              # Use a proxy so we can get the correct content type
              echo "url_flamegraph=https://githubproxy.samuelcolvin.workers.dev/$GITHUB_REPOSITORY/releases/download/$TAG/$asset" >> "$GITHUB_OUTPUT"
            fi
          fi

          flamegraph_html="$WORK_DIR/run/client_profile.html"
          if [ -f "$flamegraph_html" ]; then
            asset="${prefix}-flamegraph.html"
            cp "$flamegraph_html" "/tmp/$asset"
            if gh release upload "$TAG" "/tmp/$asset" -R "$GITHUB_REPOSITORY" --clobber; then
              # Use a proxy so the interactive flamegraph is served as text/html and renders in the browser
              echo "url_flamegraph_html=https://githubproxy.samuelcolvin.workers.dev/$GITHUB_REPOSITORY/releases/download/$TAG/$asset" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload test job summary
        shell: bash
        if: success() || failure()
        continue-on-error: true
        env:
          URL_mainmenu: ${{ steps.publish-media.outputs.url_mainmenu }}
          URL_serverloaded: ${{ steps.publish-media.outputs.url_serverloaded }}
          URL_dual: ${{ steps.publish-media.outputs.url_dual }}
          URL_worldloaded: ${{ steps.publish-media.outputs.url_worldloaded }}
          VIDEO_RELEASE_URL: ${{ steps.publish-media.outputs.url_video }}
          FLAMEGRAPH_RELEASE_URL: ${{ steps.publish-media.outputs.url_flamegraph }}
          FLAMEGRAPH_HTML_URL: ${{ steps.publish-media.outputs.url_flamegraph_html }}
        run: |
          echo "<details open><summary><b>Client test results (Java ${{ matrix.java-version }})</b></summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Java ${{ matrix.java-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ------ |" >> "$GITHUB_STEP_SUMMARY"

          while IFS=: read -r marker label; do
            url_var="URL_$marker"
            url="${!url_var}"
            cell=""
            if [ -n "$url" ]; then
              cell="![screenshot]($url)"
            else
              cell=":x:"
            fi
            # Show the flamegraph svg side by side with the main menu screenshot,
            # linking to the interactive html version (and falling back to the svg).
            if [ "$marker" = "mainmenu" ] && [ -n "$FLAMEGRAPH_RELEASE_URL" ]; then
              href="${FLAMEGRAPH_HTML_URL:-$FLAMEGRAPH_RELEASE_URL}"
              cell="$cell <a href=\"$href\"><img src=\"$FLAMEGRAPH_RELEASE_URL\" alt=\"flamegraph\" width=\"${FLAMEGRAPH_W:-840}\" height=\"${FLAMEGRAPH_H:-480}\"></a>"
            fi
            echo "| $label | $cell |" >> "$GITHUB_STEP_SUMMARY"
          done <<'EOF'
          mainmenu:Main menu
          serverloaded:Joined server
          dual:HQA tests
          worldloaded:Joined singleplayer
          EOF

          if [ -n "$VIDEO_RELEASE_URL" ]; then
            echo "| Recording | [:white_check_mark: recording]($VIDEO_RELEASE_URL) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Recording | :x: |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Format HQA test report
        id: hqa-format
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d
        if: success() || failure()
        with:
          report_paths: "${{ env.WORK_DIR }}/run/*horizonqa.xml"
          annotate_only: true
          job_summary: false
          detailed_summary: true
          include_passed: true

      - name: Write HQA test results to summary
        if: success() || failure()
        env:
          TABLE: ${{ steps.hqa-format.outputs.detailed_summary }}
          JAVA: ${{ matrix.java-version }}
        run: |
          {
            printf '<details><summary><b>HQA test results (Java %s)</b></summary>\n' "$JAVA"
            printf '%s\n' "$TABLE"
            printf '</details>\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Final important summary append
        shell: bash
        if: success()
        run: |
          echo "# :shipit:" >> "$GITHUB_STEP_SUMMARY"


  prune-old-media:
    needs: test
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write # delete old release assets
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ inputs.media-tag }}
      RETENTION_DAYS: ${{ inputs.retention-days }}
      MAX_ASSETS: ${{ inputs.max-assets }}
    steps:
      - name: Prune media older than retention window
        shell: bash
        run: |
          set -uo pipefail
          cutoff=$(date -d "$RETENTION_DAYS days ago" +%Y-%m-%d)
          echo "Pruning $TAG assets dated before $cutoff"
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | \
          while read -r name; do
            # Asset names should start with the ISO date they were produced (YYYY-MM-DD)
            asset_date="${name:0:10}"
            case "$asset_date" in
              [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]) ;;
              *) continue ;;
            esac
            if [[ "$asset_date" < "$cutoff" ]]; then
              echo "Deleting $name (dated $asset_date) since it's older than $RETENTION_DAYS days"
              gh release delete-asset "$TAG" "$name" -R "$GITHUB_REPOSITORY" --yes || true
            fi
          done

      - name: Prune oldest media when over the max asset count
        shell: bash
        run: |
          set -uo pipefail
          # Collect dated assets sorted oldest first (the ISO date prefix should sort chronologically)
          mapfile -t names < <(
            gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | \
            while read -r name; do
              asset_date="${name:0:10}"
              case "$asset_date" in
                [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]) echo "$name" ;;
              esac
            done | sort
          )
          total=${#names[@]}
          echo "Found $total dated $TAG assets (max $MAX_ASSETS)"
          if (( total > MAX_ASSETS )); then
            to_delete=$(( total - MAX_ASSETS ))
            echo "Over capacity by $to_delete; deleting the $to_delete oldest assets"
            for name in "${names[@]:0:to_delete}"; do
              echo "Deleting $name (over the $MAX_ASSETS asset cap)"
              gh release delete-asset "$TAG" "$name" -R "$GITHUB_REPOSITORY" --yes || true
            done
          fi
